<!DOCTYPE html>
<html>
  <head>
    <title>My Game Site</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
  </head>

  <body>

    <!-- HERO SECTION -->
    <section class="hero">
      <h1 class="hero-title">My Game Site</h1>
      <p class="hero-subtitle">Scroll down to explore</p>
    </section>

    <!-- GAME LIST SECTION -->
    <section class="game-section">
      <h2 class="section-title">Games</h2>

      <!-- SCROLLABLE GAME LIST -->
      <div class="game-scroll-box">

  <a href="Games/Pong/index.html" class="game-row">
    <img src="Games/Pong/icon.png" alt="Pong Icon">
    <span>Pong</span>
  </a>

  <a href="Games/Snake/index.html" class="game-row">
    <img src="Games/Snake/icon.png" alt="Snake Icon">
    <span>Snake</span>
  </a>

  <a href="Games/ClumsyBird/index.html" class="game-row">
 <img src="Games/ClumsyBird/myicon.png" alt="Clumsy Bird Icon">
  <span>Clumsy Bird</span>
</a>

        <a href="Games/Gladihoppers/index.html" class="game-row">
  <img src="Games/Gladihoppers/icon.png" alt="Gladihoppers Icon">
  <span>Gladihoppers</span>
</a>

<a href="Games/Slope/index.html" class="game-row">
  <img src="Games/Slope/icon.png" alt="Slope Icon">
  <span>Slope</span>
</a>

<a href="Games/RetroBowl/index.html" class="game-row">
  <img src="Games/RetroBowl/icon.png" alt="Retro Bowl Icon">
  <span>Retro Bowl</span>
</a>

</div>
      <input type="text" id="gameSearch" placeholder="Search games..." class="search-bar">


    </section>
<script>
  const searchInput = document.getElementById("gameSearch");
  const gameRows = document.querySelectorAll(".game-row");

  searchInput.addEventListener("input", function () {
    const query = this.value.toLowerCase();

    gameRows.forEach(row => {
      const gameName = row.innerText.toLowerCase();

      // Fuzzy match: checks if ANY part of the name matches
      if (gameName.includes(query)) {
        row.style.display = "flex";
      } else {
        row.style.display = "none";
      }
    });
  });
</script>

  </body>
</html>
